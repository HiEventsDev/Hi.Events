name: hi_events_checkin
description: Hi.Events mobile check-in application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  # State Management
  provider: ^6.1.1
  # QR Scanning
  mobile_scanner: ^5.1.1
  # Networking
  dio: ^5.4.0
  # Local Storage
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  # Authentication
  flutter_secure_storage: ^9.0.0
  # Utilities
  intl: ^0.19.0
  connectivity_plus: ^5.0.2
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/
