name: Build Multi-Arch Docker Image

on:
  # Trigger on new tags (when you sync from upstream)
  push:
    tags:
      - 'v*'
  # Manual trigger
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to build (e.g., v1.6.0)'
        required: false
        default: 'latest'
  # Check upstream releases daily
  schedule:
    - cron: '0 6 * * *'  # Every day at 6 AM UTC

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/hi-events-all-in-one

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Check upstream release
        id: check
        run: |
          # Get latest release from upstream
          LATEST=$(curl -s https://api.github.com/repos/HiEventsDev/Hi.Events/releases/latest | jq -r '.tag_name')
          echo "Latest upstream version: $LATEST"

          # Check if we already have this version
          TOKEN="${{ secrets.DOCKERHUB_TOKEN }}"
          USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"

          if [ -n "$TOKEN" ] && [ -n "$USERNAME" ]; then
            EXISTS=$(curl -s "https://hub.docker.com/v2/repositories/$USERNAME/hi-events-all-in-one/tags/$LATEST" | jq -r '.name // empty')
            if [ "$EXISTS" = "$LATEST" ]; then
              echo "Version $LATEST already exists, skipping build"
              echo "should_build=false" >> $GITHUB_OUTPUT
            else
              echo "New version $LATEST found, will build"
              echo "should_build=true" >> $GITHUB_OUTPUT
              echo "version=$LATEST" >> $GITHUB_OUTPUT
            fi
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "version=$LATEST" >> $GITHUB_OUTPUT
          fi

  build-and-push:
    needs: check-upstream
    if: needs.check-upstream.outputs.should_build == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with upstream (for scheduled builds)
        if: github.event_name == 'schedule'
        run: |
          git remote add upstream https://github.com/HiEventsDev/Hi.Events.git || true
          git fetch upstream
          VERSION="${{ needs.check-upstream.outputs.version }}"
          git checkout $VERSION || git checkout upstream/main

      - name: Set up QEMU (for multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.event_name == 'schedule' }}
            type=raw,value=${{ needs.check-upstream.outputs.version }},enable=${{ github.event_name == 'schedule' }}
            type=raw,value=${{ github.event.inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.all-in-one.arm
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
